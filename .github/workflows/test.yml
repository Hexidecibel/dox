name: test

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  e2e:
    name: playwright (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on master pushes or manual dispatch — we don't want every
    # feature-branch push hammering staging.
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests against staging
        run: npx playwright test
        env:
          CI: '1'
          # E2E_BASE_URL defaults to the staging URL inside
          # playwright.config.ts; override here if needed.
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://doc-upload-site-staging.pages.dev' }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
